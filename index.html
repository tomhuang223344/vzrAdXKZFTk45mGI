                padding: 10px;
            }

            .filter-options {
                max-height: 100px;
                gap: 6px;
                padding: 8px;
            }

            .filter-option {
                font-size: 0.75rem;
                padding: 3px 6px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Gaming Laptop Performance Benchmark</h1>
        </header>
        
        <section class="control-section">
            <div class="left-controls">
                <div class="control-group">
                    <div class="sheet-selector" id="sheetSelector" style="display: none;">
                        <label for="sheetSelect">选择工作表:</label>
                        <select id="sheetSelect"></select>
                    </div>
                </div>
                <button class="btn btn-filter" id="filterToggleBtn">
                    <span id="filterToggleText">📊 显示筛选</span>
                    <span id="filterActiveIndicator" class="filter-status" style="display: none;">●</span>
                </button>
            </div>
            <div class="right-controls">
                <div class="selection-group">
                    <button class="btn btn-select-all" id="selectAllBtn">全选</button>
                    <span class="selection-info" id="selectionInfo">已选择 0 行</span>
                    <button class="btn btn-local btn-hidden" id="localFileBtn">本地读取 Excel</button>
                    <button class="btn" id="helpBtn" style="background: linear-gradient(90deg, #607d8b 0%, #455a64 100%);">⌨️ 快捷鍵</button>
                    <button class="btn" id="resetSortBtn" style="background: linear-gradient(90deg, #ff9800 0%, #f57c00 100%);">重置排序</button>
                    <button class="btn btn-export" id="exportBtn">匯出選取資料</button>
                    <button class="btn btn-refresh" id="refreshBtn">更新</button>
                </div>
            </div>
        </section>

        <!-- 篩選面板 -->
        <div class="filter-panel" id="filterPanel">
            <div class="filter-section" id="cpuFilterSection">
                <div class="filter-header">
                    <div class="filter-title">CPU 篩選</div>
                    <span class="filter-selected-count" id="cpuSelectedCount"></span>
                </div>
                <div class="filter-options" id="cpuFilterOptions">
                    <!-- CPU篩選選項將在這裡動態生成 -->
                </div>
                <div class="no-filter-data" id="cpuNoData" style="display: none;">找不到 CPU 欄位</div>
            </div>
            
            <div class="filter-section" id="gpuFilterSection">
                <div class="filter-header">
                    <div class="filter-title">GPU 篩選</div>
                    <span class="filter-selected-count" id="gpuSelectedCount"></span>
                </div>
                <div class="filter-options" id="gpuFilterOptions">
                    <!-- GPU篩選選項將在這裡動態生成 -->
                </div>
                <div class="no-filter-data" id="gpuNoData" style="display: none;">找不到 GPU 欄位</div>
            </div>
            
            <div class="filter-section" id="mgpFilterSection">
                <div class="filter-header">
                    <div class="filter-title">MGP 篩選</div>
                    <span class="filter-selected-count" id="mgpSelectedCount"></span>
                </div>
                <div class="filter-options" id="mgpFilterOptions">
                    <!-- MGP篩選選項將在這裡動態生成 -->
                </div>
                <div class="no-filter-data" id="mgpNoData" style="display: none;">找不到 MGP 欄位</div>
            </div>
            
            <div class="filter-actions">
                <button class="filter-btn apply" id="applyFilter">套用篩選</button>
                <button class="filter-btn clear" id="clearFilter">清除篩選</button>
                <button class="filter-btn clear-all" id="clearAllFilters">清除全部</button>
                <button class="filter-btn" id="saveFilterBtn">💾 保存篩選</button>
                <select class="filter-select" id="loadFilterSelect">
                    <option value="">載入已保存篩選</option>
                </select>
                <button class="filter-btn" id="exportFilteredBtn">導出篩選結果</button>
                <button class="filter-btn" id="statsBtn">📊 統計</button>
            </div>
        </div>
        
        <section class="table-section">
            <div class="table-wrapper" id="tableWrapper" tabindex="0">
                <div id="tableContainer">
                    <div class="no-data">正在加载表格数据...</div>
                </div>
            </div>
        </section>
    </div>

    <div id="statusBar"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const tableContainer = document.getElementById('tableContainer');
            const tableWrapper = document.getElementById('tableWrapper');
            const sheetSelector = document.getElementById('sheetSelector');
            const sheetSelect = document.getElementById('sheetSelect');
            const selectAllBtn = document.getElementById('selectAllBtn');
            const refreshBtn = document.getElementById('refreshBtn');
            const exportBtn = document.getElementById('exportBtn');
            const localFileBtn = document.getElementById('localFileBtn');
            const selectionInfo = document.getElementById('selectionInfo');
            const filterToggleBtn = document.getElementById('filterToggleBtn');
            const filterToggleText = document.getElementById('filterToggleText');
            const filterActiveIndicator = document.getElementById('filterActiveIndicator');
            const helpBtn = document.getElementById('helpBtn');
            const resetSortBtn = document.getElementById('resetSortBtn');
            
            // 篩選相關元素
            const filterPanel = document.getElementById('filterPanel');
            const cpuFilterOptions = document.getElementById('cpuFilterOptions');
            const gpuFilterOptions = document.getElementById('gpuFilterOptions');
            const mgpFilterOptions = document.getElementById('mgpFilterOptions');
            const cpuNoData = document.getElementById('cpuNoData');
            const gpuNoData = document.getElementById('gpuNoData');
            const mgpNoData = document.getElementById('mgpNoData');
            const cpuSelectedCount = document.getElementById('cpuSelectedCount');
            const gpuSelectedCount = document.getElementById('gpuSelectedCount');
            const mgpSelectedCount = document.getElementById('mgpSelectedCount');
            const applyFilterBtn = document.getElementById('applyFilter');
            const clearFilterBtn = document.getElementById('clearFilter');
            const clearAllFiltersBtn = document.getElementById('clearAllFilters');
            const saveFilterBtn = document.getElementById('saveFilterBtn');
            const loadFilterSelect = document.getElementById('loadFilterSelect');
            const exportFilteredBtn = document.getElementById('exportFilteredBtn');
            const statsBtn = document.getElementById('statsBtn');
            
            let currentWorkbook = null;
            let currentSheetData = null;
            let currentSortColumn = null;
            let currentSortDirection = null;
            let selectedRows = new Set();
            let isLocalFileBtnVisible = false;
            let isFilterPanelVisible = false;
            
            // 篩選值集合
            let cpuFilterValues = new Set();
            let gpuFilterValues = new Set();
            let mgpFilterValues = new Set();
            
            // 原始篩選值集合（用於計數）
            let cpuOriginalValues = new Set();
            let gpuOriginalValues = new Set();
            let mgpOriginalValues = new Set();
            
            // 欄位索引
            let cpuColumnIndex = -1;
            let gpuColumnIndex = -1;
            let mgpColumnIndex = -1;
            
            // 原始數據
            let originalDataRows = [];
            
            // 當前顯示的數據（篩選後）
            let currentDisplayData = [];
            
            // 是否正在應用篩選
            let isApplyingFilter = false;
            
            // 篩選歷史
            let filterHistory = [];
            const MAX_HISTORY = 10;

            // 創建快捷鍵提示元素
            const shortcutHint = document.createElement('div');
            shortcutHint.className = 'shortcut-hint';
            document.body.appendChild(shortcutHint);
            
            // 顯示快捷鍵提示
            function showShortcutHint(message) {
                shortcutHint.textContent = message;
                shortcutHint.classList.add('show');
                setTimeout(() => {
                    shortcutHint.classList.remove('show');
                }, 2000);
                
                // 同時更新狀態欄
                const statusBar = document.getElementById('statusBar');
                statusBar.textContent = message;
                statusBar.style.opacity = '1';
                setTimeout(() => {
                    statusBar.style.opacity = '0';
                }, 2000);
            }
            
            // 頁面加載時自動讀取文件
            loadExcelFile();
            
            // 載入按鈕顯示狀態
            function loadButtonVisibilityPreference() {
                const saved = localStorage.getItem('localFileBtnVisible');
                if (saved !== null) {
                    isLocalFileBtnVisible = saved === 'true';
                    if (!isLocalFileBtnVisible) {
                        localFileBtn.classList.add('btn-hidden');
                    }
                } else {
                    isLocalFileBtnVisible = false;
                    localFileBtn.classList.add('btn-hidden');
                }
            }
            
            loadButtonVisibilityPreference();
            
            // 載入篩選面板狀態
            function loadFilterPanelState() {
                const savedFilterState = localStorage.getItem('filterPanelVisible');
                if (savedFilterState === 'true') {
                    isFilterPanelVisible = true;
                    filterPanel.classList.add('show');
                    filterToggleText.textContent = '📊 隐藏筛选';
                    filterToggleBtn.classList.add('active');
                } else {
                    isFilterPanelVisible = false;
                    filterPanel.classList.remove('show');
                    filterToggleText.textContent = '📊 显示筛选';
                    filterToggleBtn.classList.remove('active');
                }
            }
            
            loadFilterPanelState();
            
            // 載入篩選狀態
            function loadFilterState() {
                const saved = localStorage.getItem('filterState');
                if (saved) {
                    try {
                        const filterState = JSON.parse(saved);
                        cpuFilterValues = new Set(filterState.cpu || []);
                        gpuFilterValues = new Set(filterState.gpu || []);
                        mgpFilterValues = new Set(filterState.mgp || []);
                        
                        // 更新篩選指示器
                        updateFilterActiveIndicator();
                        
                        // 更新復選框狀態
                        if (currentSheetData) {
                            setTimeout(() => {
                                updateCheckboxStates();
                                updateSelectedCounts();
                            }, 100);
                        }
                    } catch (e) {
                        console.error('加載篩選狀態失敗:', e);
                    }
                }
            }
            
            // 載入篩選歷史
            function loadFilterHistory() {
                const saved = localStorage.getItem('filterHistory');
                if (saved) {
                    try {
                        filterHistory = JSON.parse(saved);
                    } catch (e) {
                        console.error('載入篩選歷史失敗:', e);
                    }
                }
            }
            
            loadFilterHistory();
            
            // 載入已保存的篩選條件
            function loadSavedFilters() {
                const filters = JSON.parse(localStorage.getItem('savedFilters') || '{}');
                loadFilterSelect.innerHTML = '<option value="">載入已保存篩選</option>';
                
                Object.keys(filters).forEach(name => {
                    const option = document.createElement('option');
                    option.value = name;
                    option.textContent = name;
                    loadFilterSelect.appendChild(option);
                });
            }
            
            loadSavedFilters();
            
            // 更新篩選激活指示器
            function updateFilterActiveIndicator() {
                const hasActiveFilter = cpuFilterValues.size > 0 || gpuFilterValues.size > 0 || mgpFilterValues.size > 0;
                if (hasActiveFilter) {
                    filterActiveIndicator.style.display = 'inline-block';
                } else {
                    filterActiveIndicator.style.display = 'none';
                }
            }
            
            // 更新各區段選中數量
            function updateSelectedCounts() {
                cpuSelectedCount.textContent = cpuFilterValues.size > 0 ? `(${cpuFilterValues.size})` : '';
                gpuSelectedCount.textContent = gpuFilterValues.size > 0 ? `(${gpuFilterValues.size})` : '';
                mgpSelectedCount.textContent = mgpFilterValues.size > 0 ? `(${mgpFilterValues.size})` : '';
            }
            
            // 本地讀取按鈕事件
            localFileBtn.addEventListener('click', function() {
                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.accept = '.xlsx,.xls,.csv';
                fileInput.style.display = 'none';
                
                fileInput.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (file) {
                        loadLocalExcelFile(file);
                    }
                    document.body.removeChild(fileInput);
                });
                
                document.body.appendChild(fileInput);
                fileInput.click();
            });
            
            // 載入本地Excel文件
            function loadLocalExcelFile(file) {
                tableContainer.innerHTML = '<div class="no-data">正在讀取本地文件...</div>';
                sheetSelector.style.display = 'none';
                currentSortColumn = null;
                currentSortDirection = null;
                selectedRows.clear();
                updateSelectionInfo();
                
                localFileBtn.disabled = true;
                localFileBtn.textContent = '讀取中...';
                
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    try {
                        const data = new Uint8Array(e.target.result);
                        currentWorkbook = XLSX.read(data, { type: 'array' });
                        
                        tableContainer.innerHTML = '';
                        displayWorkbook(currentWorkbook);
                        
                        showShortcutHint(`成功載入: ${file.name}`);
                        
                        setTimeout(() => {
                            tableWrapper.focus();
                        }, 500);
                    } catch (error) {
                        console.error('讀取本地Excel文件時出錯:', error);
                        tableContainer.innerHTML = `<div class="no-data">讀取失敗: ${error.message}</div>`;
                        showShortcutHint('文件讀取失敗');
                    } finally {
                        localFileBtn.disabled = false;
                        localFileBtn.textContent = '本地讀取 Excel';
                    }
                };
                
                reader.onerror = function() {
                    tableContainer.innerHTML = '<div class="no-data">文件讀取錯誤</div>';
                    localFileBtn.disabled = false;
                    localFileBtn.textContent = '本地讀取 Excel';
                    showShortcutHint('文件讀取錯誤');
                };
                
                reader.readAsArrayBuffer(file);
            }
            
            // 快捷鍵
            document.addEventListener('keydown', function(e) {
                if (e.ctrlKey && e.altKey && e.key === 'F8') {
                    e.preventDefault();
                    toggleLocalFileButton();
                }
                
                // Ctrl+A 全選
                if (e.ctrlKey && e.key === 'a') {
                    e.preventDefault();
                    if (tableWrapper.contains(document.activeElement)) {
                        selectAllBtn.click();
                    }
                }
                
                // Esc 清除所有篩選
                if (e.key === 'Escape' && isFilterPanelVisible) {
                    clearFilter('all');
                }
                
                // Ctrl+F 聚焦篩選面板
                if (e.ctrlKey && e.key === 'f') {
                    e.preventDefault();
                    if (!isFilterPanelVisible) {
                        filterToggleBtn.click();
                    }
                    filterPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
                
                if (sheetSelect === document.activeElement && 
                    ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                    e.preventDefault();
                }
            });
            
            // 切換本地讀取按鈕顯示狀態
            function toggleLocalFileButton() {
                isLocalFileBtnVisible = !isLocalFileBtnVisible;
                
                if (isLocalFileBtnVisible) {
                    localFileBtn.classList.remove('btn-hidden');
                    showShortcutHint('本地讀取按鈕已顯示');
                } else {
                    localFileBtn.classList.add('btn-hidden');
                    showShortcutHint('本地讀取按鈕已隱藏');
                }
                
                saveButtonVisibilityPreference();
            }
            
            // 保存按鈕顯示狀態到本地存儲
            function saveButtonVisibilityPreference() {
                localStorage.setItem('localFileBtnVisible', isLocalFileBtnVisible.toString());
            }
            
            // 快捷鍵幫助
            helpBtn.addEventListener('click', function() {
                const shortcuts = [
                    'Ctrl+A: 全選資料',
                    'Ctrl+F: 快速打開篩選面板',
                    'Esc: 清除所有篩選',
                ];
                
                alert('鍵盤快捷鍵：\n' + shortcuts.join('\n'));
            });
            
            // 重置排序
            resetSortBtn.addEventListener('click', function() {
                currentSortColumn = null;
                currentSortDirection = null;
                
                // 清除排序圖標
                const headers = tableContainer.querySelectorAll('th');
                headers.forEach(header => {
                    const sortIcons = header.querySelectorAll('.sort-icon');
                    sortIcons.forEach(icon => {
                        icon.classList.remove('active');
                    });
                });
                
                // 恢復原始順序
                if (originalDataRows.length > 0) {
                    currentDisplayData = [...originalDataRows];
                    renderTable(currentDisplayData);
                }
                
                showShortcutHint('排序已重置');
            });
            
            // 篩選面板切換事件
            filterToggleBtn.addEventListener('click', function() {
                isFilterPanelVisible = !isFilterPanelVisible;
                if (isFilterPanelVisible) {
                    filterPanel.classList.add('show');
                    filterToggleText.textContent = '📊 隐藏筛选';
                    filterToggleBtn.classList.add('active');
                } else {
                    filterPanel.classList.remove('show');
                    filterToggleText.textContent = '📊 显示筛选';
                    filterToggleBtn.classList.remove('active');
                }
                
                localStorage.setItem('filterPanelVisible', isFilterPanelVisible.toString());
            });
            
            // 篩選功能事件監聽
            applyFilterBtn.addEventListener('click', function() {
                if (!isApplyingFilter) {
                    applyFilter();
                }
            });
            
            clearFilterBtn.addEventListener('click', function() {
                clearFilter('current');
            });
            
            clearAllFiltersBtn.addEventListener('click', function() {
                clearFilter('all');
            });
            
            // 保存篩選條件
            saveFilterBtn.addEventListener('click', function() {
                const name = prompt('請輸入篩選條件名稱：');
                if (name) {
                    saveCurrentFilter(name);
                }
            });
            
            // 載入篩選條件
            loadFilterSelect.addEventListener('change', function() {
                if (this.value) {
                    loadSavedFilter(this.value);
                    this.value = '';
                }
            });
            
            // 導出篩選結果
            exportFilteredBtn.addEventListener('click', function() {
                exportFilteredRows();
            });
            
            // 顯示統計
            statsBtn.addEventListener('click', function() {
                showFilterStats();
            });
            
            // 添加篩選區段折疊/展開功能
            document.querySelectorAll('.filter-header').forEach(header => {
                header.addEventListener('click', function(e) {
                    if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') {
                        return;
                    }
                    const section = this.parentElement;
                    section.classList.toggle('collapsed');
                });
            });
            
            // 保存篩選條件
            function saveCurrentFilter(name) {
                const filters = JSON.parse(localStorage.getItem('savedFilters') || '{}');
                filters[name] = {
                    cpu: Array.from(cpuFilterValues),
                    gpu: Array.from(gpuFilterValues),
                    mgp: Array.from(mgpFilterValues)
                };
                localStorage.setItem('savedFilters', JSON.stringify(filters));
                loadSavedFilters();
                showShortcutHint(`篩選條件「${name}」已保存`);
            }
            
            // 載入篩選條件
            function loadSavedFilter(name) {
                const filters = JSON.parse(localStorage.getItem('savedFilters') || '{}');
                const filter = filters[name];
                if (filter) {
                    cpuFilterValues = new Set(filter.cpu || []);
                    gpuFilterValues = new Set(filter.gpu || []);
                    mgpFilterValues = new Set(filter.mgp || []);
                    
                    updateCheckboxStates();
                    updateSelectedCounts();
                    applyFilter();
                    showShortcutHint(`已載入篩選條件「${name}」`);
                }
            }
            
            // 防抖函數
            function debounce(func, wait) {
                let timeout;
                return function executedFunction(...args) {
                    const later = () => {
                        clearTimeout(timeout);
                        func(...args);
                    };
                    clearTimeout(timeout);
                    timeout = setTimeout(later, wait);
                };
            }
            
            const debouncedApplyFilter = debounce(function() {
                applyFilter();
            }, 300);
            
            // 篩選選項變更事件
            function handleFilterCheckboxChange(e) {
                e.stopPropagation();
                
                if (this.checked) {
                    if (this.dataset.filterType === 'cpu') {
                        cpuFilterValues.add(this.value);
                    } else if (this.dataset.filterType === 'gpu') {
                        gpuFilterValues.add(this.value);
                    } else if (this.dataset.filterType === 'mgp') {
                        mgpFilterValues.add(this.value);
                    }
                } else {
                    if (this.dataset.filterType === 'cpu') {
                        cpuFilterValues.delete(this.value);
                    } else if (this.dataset.filterType === 'gpu') {
                        gpuFilterValues.delete(this.value);
                    } else if (this.dataset.filterType === 'mgp') {
                        mgpFilterValues.delete(this.value);
                    }
                }
                
                updateSelectedCounts();
                debouncedApplyFilter();
            }
            
            // 套用篩選
            function applyFilter() {
                if (isApplyingFilter || !currentSheetData || currentSheetData.length < 2) return;
                
                isApplyingFilter = true;
                applyFilterBtn.disabled = true;
                applyFilterBtn.textContent = '篩選中...';
                
                requestAnimationFrame(() => {
                    setTimeout(() => {
                        try {
                            const headers = currentSheetData[0];
                            const dataRows = currentSheetData.slice(1);
                            
                            if (cpuFilterValues.size === 0 && gpuFilterValues.size === 0 && mgpFilterValues.size === 0) {
                                currentDisplayData = [...dataRows];
                            } else {
                                currentDisplayData = dataRows.filter(row => {
                                    let cpuMatch = true;
                                    let gpuMatch = true;
                                    let mgpMatch = true;
                                    
                                    if (cpuColumnIndex !== -1 && cpuFilterValues.size > 0) {
                                        const cpuValue = row[cpuColumnIndex] || '';
                                        cpuMatch = cpuFilterValues.has(cpuValue.toString());
                                    }
                                    
                                    if (gpuColumnIndex !== -1 && gpuFilterValues.size > 0) {
                                        const gpuValue = row[gpuColumnIndex] || '';
                                        gpuMatch = gpuFilterValues.has(gpuValue.toString());
                                    }
                                    
                                    if (mgpColumnIndex !== -1 && mgpFilterValues.size > 0) {
                                        const mgpValue = row[mgpColumnIndex] || '';
                                        mgpMatch = mgpFilterValues.has(mgpValue.toString());
                                    }
                                    
                                    return cpuMatch && gpuMatch && mgpMatch;
                                });
                            }
                            
                            if (currentSortColumn !== null && currentSortDirection !== null) {
                                sortData(currentSortColumn, currentSortDirection);
                            }
                            
                            renderTable(currentDisplayData);
                            updateFilterCounts(originalDataRows);
                            updateFilterActiveIndicator();
                            saveFilterState();
                            saveFilterHistory();
                            
                        } catch (error) {
                            console.error('篩選過程中出錯:', error);
                            showShortcutHint('篩選失敗');
                        } finally {
                            isApplyingFilter = false;
                            applyFilterBtn.disabled = false;
                            applyFilterBtn.textContent = '套用篩選';
                        }
                    }, 10);
                });
            }
            
            // 保存篩選歷史
            function saveFilterHistory() {
                const currentFilter = {
                    cpu: Array.from(cpuFilterValues),
                    gpu: Array.from(gpuFilterValues),
                    mgp: Array.from(mgpFilterValues),
                    timestamp: new Date().toLocaleString()
                };
                
                filterHistory.unshift(currentFilter);
                if (filterHistory.length > MAX_HISTORY) {
                    filterHistory.pop();
                }
                
                localStorage.setItem('filterHistory', JSON.stringify(filterHistory));
            }
            
            // 清除篩選
            function clearFilter(mode = 'current') {
                if (mode === 'all' || mode === 'current') {
                    const checkboxes = filterPanel.querySelectorAll('.filter-checkbox');
                    checkboxes.forEach(checkbox => {
                        checkbox.checked = false;
                    });
                    
                    cpuFilterValues.clear();
                    gpuFilterValues.clear();
                    mgpFilterValues.clear();
                    
                    updateSelectedCounts();
                    
                    if (currentSheetData && currentSheetData.length > 1) {
                        currentDisplayData = [...originalDataRows];
                        
                        if (currentSortColumn !== null && currentSortDirection !== null) {
                            sortData(currentSortColumn, currentSortDirection);
                        }
                        
                        renderTable(currentDisplayData);
                        updateFilterCounts(originalDataRows);
                    }
                    
                    updateFilterActiveIndicator();
                    saveFilterState();
                }
            }
            
            // 渲染表格
            function renderTable(data) {
                const table = tableContainer.querySelector('table');
                if (!table) return;
                
                const tbody = table.querySelector('tbody');
                const headers = currentSheetData[0];
                
                const fragment = document.createDocumentFragment();
                
                selectedRows.clear();
                updateSelectionInfo();
                
                data.forEach((rowData, index) => {
                    const row = document.createElement('tr');
                    
                    const selectCell = document.createElement('td');
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.className = 'select-checkbox';
                    checkbox.dataset.rowIndex = index;
                    
                    checkbox.addEventListener('change', function(e) {
                        e.stopPropagation();
                        const rowIndex = parseInt(this.dataset.rowIndex);
                        if (this.checked) {
                            selectedRows.add(rowIndex);
                        } else {
                            selectedRows.delete(rowIndex);
                        }
                        updateSelectionInfo();
                        updateRowSelectionStyles();
                        updateSelectAllHeaderState();
                    });
                    
                    selectCell.appendChild(checkbox);
                    row.appendChild(selectCell);
                    
                    for (let j = 0; j < headers.length; j++) {
                        const td = document.createElement('td');
                        const cellValue = rowData[j] || '';
                        td.textContent = cellValue;
                        td.title = cellValue;
                        row.appendChild(td);
                    }
                    
                    fragment.appendChild(row);
                });
                
                tbody.innerHTML = '';
                tbody.appendChild(fragment);
                
                updateRowSelectionStyles();
                updateSelectAllHeaderState();
            }
            
            // 更新全選頭部狀態
            function updateSelectAllHeaderState() {
                const selectAllHeader = document.getElementById('selectAllHeader');
                if (selectAllHeader) {
                    const checkboxes = document.querySelectorAll('.select-checkbox:not(#selectAllHeader)');
                    const allChecked = Array.from(checkboxes).every(cb => cb.checked);
                    const anyChecked = Array.from(checkboxes).some(cb => cb.checked);
                    
                    selectAllHeader.checked = allChecked;
                    selectAllHeader.indeterminate = !allChecked && anyChecked;
                }
            }
            
            // 排序數據
            function sortData(columnIndex, direction) {
                if (!currentDisplayData || currentDisplayData.length === 0) return;
                
                currentDisplayData.sort((a, b) => {
                    let valueA = a[columnIndex];
                    let valueB = b[columnIndex];
                    
                    const numA = parseFloat(valueA);
                    const numB = parseFloat(valueB);
                    
                    if (!isNaN(numA) && !isNaN(numB)) {
                        valueA = numA;
                        valueB = numB;
                    } else {
                        valueA = String(valueA || '').toLowerCase();
                        valueB = String(valueB || '').toLowerCase();
                    }
                    
                    if (direction === 'asc') {
                        return valueA < valueB ? -1 : valueA > valueB ? 1 : 0;
                    } else {
                        return valueA > valueB ? -1 : valueA < valueB ? 1 : 0;
                    }
                });
                
                currentSortColumn = columnIndex;
                currentSortDirection = direction;
            }
            
            // 更新篩選計數
            function updateFilterCounts(data) {
                if (!data || data.length === 0) return;
                
                const cpuCounts = new Map();
                const gpuCounts = new Map();
                const mgpCounts = new Map();
                
                data.forEach(row => {
                    if (cpuColumnIndex !== -1) {
                        const cpuValue = row[cpuColumnIndex] || '';
                        if (cpuValue) {
                            const valueStr = cpuValue.toString();
                            cpuCounts.set(valueStr, (cpuCounts.get(valueStr) || 0) + 1);
                        }
                    }
                    
                    if (gpuColumnIndex !== -1) {
                        const gpuValue = row[gpuColumnIndex] || '';
                        if (gpuValue) {
                            const valueStr = gpuValue.toString();
                            gpuCounts.set(valueStr, (gpuCounts.get(valueStr) || 0) + 1);
                        }
                    }
                    
                    if (mgpColumnIndex !== -1) {
                        const mgpValue = row[mgpColumnIndex] || '';
                        if (mgpValue) {
                            const valueStr = mgpValue.toString();
                            mgpCounts.set(valueStr, (mgpCounts.get(valueStr) || 0) + 1);
                        }
                    }
                });
                
                updateFilterSectionCounts('cpu', cpuCounts);
                updateFilterSectionCounts('gpu', gpuCounts);
                updateFilterSectionCounts('mgp', mgpCounts);
            }
            
            // 更新特定篩選區段的計數
            function updateFilterSectionCounts(filterType, valueCounts) {
                const checkboxes = document.querySelectorAll(`.filter-checkbox[data-filter-type="${filterType}"]`);
                checkboxes.forEach(checkbox => {
                    const value = checkbox.value;
                    const count = valueCounts.get(value) || 0;
                    const countElement = checkbox.parentNode.querySelector('.filter-count');
                    if (countElement) {
                        countElement.textContent = count;
                        
                        if (count === 0) {
                            checkbox.disabled = true;
                            checkbox.parentNode.classList.add('disabled');
                        } else {
                            checkbox.disabled = false;
                            checkbox.parentNode.classList.remove('disabled');
                        }
                    }
                });
            }
            
            // 保存篩選狀態
            function saveFilterState() {
                const filterState = {
                    cpu: Array.from(cpuFilterValues),
                    gpu: Array.from(gpuFilterValues),
                    mgp: Array.from(mgpFilterValues)
                };
                localStorage.setItem('filterState', JSON.stringify(filterState));
            }
            
            // 更新復選框狀態
            function updateCheckboxStates() {
                cpuFilterValues.forEach(value => {
                    const checkbox = document.querySelector(`.filter-checkbox[data-filter-type="cpu"][value="${value}"]`);
                    if (checkbox) checkbox.checked = true;
                });
                
                gpuFilterValues.forEach(value => {
                    const checkbox = document.querySelector(`.filter-checkbox[data-filter-type="gpu"][value="${value}"]`);
                    if (checkbox) checkbox.checked = true;
                });
                
                mgpFilterValues.forEach(value => {
                    const checkbox = document.querySelector(`.filter-checkbox[data-filter-type="mgp"][value="${value}"]`);
                    if (checkbox) checkbox.checked = true;
                });
                
                updateSelectedCounts();
            }
            
            // 提取欄位值並建立篩選選項
            function extractFilterValues() {
                if (!currentSheetData || currentSheetData.length < 2) return;
                
                const headers = currentSheetData[0];
                originalDataRows = currentSheetData.slice(1);
                
                cpuColumnIndex = headers.findIndex(header => 
                    header && header.toLowerCase().includes('cpu'));
                gpuColumnIndex = headers.findIndex(header => 
                    header && header.toLowerCase().includes('gpu'));
                mgpColumnIndex = headers.findIndex(header => 
                    header && header.toLowerCase().includes('mgp'));
                
                extractAndRenderFilterValues('cpu', cpuColumnIndex, cpuFilterOptions, cpuNoData);
                extractAndRenderFilterValues('gpu', gpuColumnIndex, gpuFilterOptions, gpuNoData);
                extractAndRenderFilterValues('mgp', mgpColumnIndex, mgpFilterOptions, mgpNoData);
                
                updateFilterCounts(originalDataRows);
                loadFilterState();
                
                if (cpuFilterValues.size > 0 || gpuFilterValues.size > 0 || mgpFilterValues.size > 0) {
                    setTimeout(() => {
                        applyFilter();
                    }, 100);
                }
            }
            
            // 提取並渲染特定欄位的篩選值
            function extractAndRenderFilterValues(filterType, columnIndex, optionsContainer, noDataElement) {
                if (!currentSheetData || currentSheetData.length < 2) return;
                
                const dataRows = currentSheetData.slice(1);
                
                if (columnIndex === -1) {
                    optionsContainer.style.display = 'none';
                    noDataElement.style.display = 'block';
                    return;
                }
                
                optionsContainer.style.display = 'flex';
                noDataElement.style.display = 'none';
                
                const valueMap = new Map();
                
                dataRows.forEach(row => {
                    const value = row[columnIndex] || '';
                    if (value) {
                        const valueStr = value.toString();
                        valueMap.set(valueStr, (valueMap.get(valueStr) || 0) + 1);
                    }
                });
                
                if (filterType === 'cpu') {
                    cpuOriginalValues = new Set(valueMap.keys());
                } else if (filterType === 'gpu') {
                    gpuOriginalValues = new Set(valueMap.keys());
                } else if (filterType === 'mgp') {
                    mgpOriginalValues = new Set(valueMap.keys());
                }
                
                renderFilterOptions(filterType, valueMap, optionsContainer);
            }
            
            // 渲染篩選選項
            function renderFilterOptions(filterType, valueMap, optionsContainer) {
                optionsContainer.innerHTML = '';
                
                const sortedValues = Array.from(valueMap.keys()).sort();
                
                sortedValues.forEach(value => {
                    const option = document.createElement('div');
                    option.className = 'filter-option';
                    
                    const count = valueMap.get(value) || 0;
                    
                    const checkboxId = `filter-${filterType}-${value.replace(/[^a-zA-Z0-9]/g, '-')}`;
                    
                    option.innerHTML = `
                        <input type="checkbox" class="filter-checkbox" value="${value.replace(/"/g, '&quot;')}" 
                               id="${checkboxId}" data-filter-type="${filterType}">
                        <label for="${checkboxId}" class="filter-label">
                            <span class="filter-value">${value}</span>
                            <span class="filter-count">${count}</span>
                        </label>
                    `;
                    
                    const checkbox = option.querySelector('.filter-checkbox');
                    checkbox.addEventListener('change', handleFilterCheckboxChange);
                    
                    optionsContainer.appendChild(option);
                });
                
                if (valueMap.size > 10) {
                    addFilterSearch(filterType, optionsContainer);
                }
            }
            
            // 添加篩選搜尋框
            function addFilterSearch(filterType, optionsContainer) {
                const existingSearch = optionsContainer.parentNode.querySelector('.filter-search');
                if (existingSearch) return;
                
                const searchInput = document.createElement('input');
                searchInput.type = 'text';
                searchInput.className = 'filter-search';
                searchInput.placeholder = `搜尋${filterType.toUpperCase()}...`;
                searchInput.addEventListener('input', function(e) {
                    const searchTerm = e.target.value.toLowerCase();
                    const options = optionsContainer.querySelectorAll('.filter-option');
                    options.forEach(option => {
                        const value = option.querySelector('.filter-value').textContent.toLowerCase();
                        if (value.includes(searchTerm)) {
                            option.style.display = 'flex';
                        } else {
                            option.style.display = 'none';
                        }
                    });
                });
                
                optionsContainer.parentNode.insertBefore(searchInput, optionsContainer);
            }
            
            // 導出篩選結果
            function exportFilteredRows() {
                if (currentDisplayData.length === 0) {
                    alert('沒有可導出的數據');
                    return;
                }
                
                const headers = currentSheetData[0];
                const exportData = [headers, ...currentDisplayData];
                const ws = XLSX.utils.aoa_to_sheet(exportData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, '篩選結果');
                XLSX.writeFile(wb, 'filtered_data.xlsx');
                
                showShortcutHint(`已導出 ${currentDisplayData.length} 行數據`);
            }
            
            // 顯示統計
            function showFilterStats() {
                const stats = {
                    total: originalDataRows.length,
                    filtered: currentDisplayData.length,
                    cpu: {},
                    gpu: {},
                    mgp: {}
                };
                
                if (cpuColumnIndex !== -1) {
                    currentDisplayData.forEach(row => {
                        const value = row[cpuColumnIndex] || '未知';
                        stats.cpu[value] = (stats.cpu[value] || 0) + 1;
                    });
                }
                
                if (gpuColumnIndex !== -1) {
                    currentDisplayData.forEach(row => {
                        const value = row[gpuColumnIndex] || '未知';
                        stats.gpu[value] = (stats.gpu[value] || 0) + 1;
                    });
                }
                
                if (mgpColumnIndex !== -1) {
                    currentDisplayData.forEach(row => {
                        const value = row[mgpColumnIndex] || '未知';
                        stats.mgp[value] = (stats.mgp[value] || 0) + 1;
                    });
                }
                
                const statsHtml = `
                    <h4>篩選統計</h4>
                    <p>總筆數: ${stats.total} | 篩選後: ${stats.filtered} (${Math.round(stats.filtered/stats.total*100)}%)</p>
                    ${Object.keys(stats.cpu).length > 0 ? `
                        <div>
                            <strong>CPU分佈:</strong><br>
                            ${Object.entries(stats.cpu).map(([k,v]) => `${k}: ${v}`).join('<br>')}
                        </div>
                    ` : ''}
                    ${Object.keys(stats.gpu).length > 0 ? `
                        <div>
                            <strong>GPU分佈:</strong><br>
                            ${Object.entries(stats.gpu).map(([k,v]) => `${k}: ${v}`).join('<br>')}
                        </div>
                    ` : ''}
                    ${Object.keys(stats.mgp).length > 0 ? `
                        <div>
                            <strong>MGP分佈:</strong><br>
                            ${Object.entries(stats.mgp).map(([k,v]) => `${k}: ${v}`).join('<br>')}
                        </div>
                    ` : ''}
                `;
                
                const statsDiv = document.createElement('div');
                statsDiv.className = 'stats-modal';
                statsDiv.innerHTML = statsHtml;
                
                const overlay = document.createElement('div');
                overlay.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    right: 0;
                    bottom: 0;
                    background: rgba(0,0,0,0.5);
                    z-index: 1000;
                `;
                
                overlay.addEventListener('click', function() {
                    document.body.removeChild(overlay);
                    document.body.removeChild(statsDiv);
                });
                
                document.body.appendChild(overlay);
                document.body.appendChild(statsDiv);
            }
            
            // 選擇工作表後焦點移到表格
            sheetSelect.addEventListener('change', function() {
                setTimeout(() => {
                    tableWrapper.focus();
                }, 100);
            });
            
            // 全選按鈕事件
            selectAllBtn.addEventListener('click', function() {
                const checkboxes = tableContainer.querySelectorAll('.select-checkbox:not(#selectAllHeader)');
                const allChecked = Array.from(checkboxes).every(checkbox => checkbox.checked);
                
                checkboxes.forEach(checkbox => {
                    checkbox.checked = !allChecked;
                    const rowIndex = parseInt(checkbox.dataset.rowIndex);
                    if (!allChecked) {
                        selectedRows.add(rowIndex);
                    } else {
                        selectedRows.delete(rowIndex);
                    }
                });
                
                updateSelectionInfo();
                updateRowSelectionStyles();
                
                const selectAllHeader = document.getElementById('selectAllHeader');
                if (selectAllHeader) {
                    selectAllHeader.checked = !allChecked;
                    selectAllHeader.indeterminate = false;
                }
            });
            
            // 更新按鈕事件
            refreshBtn.addEventListener('click', function() {
                loadExcelFile();
            });
            
            // 導出按鈕事件
            exportBtn.addEventListener('click', function() {
                exportSelectedRows();
            });
            
            // 更新選擇信息
            function updateSelectionInfo() {
                selectionInfo.textContent = `已选择 ${selectedRows.size} 行`;
            }
            
            // 更新行選擇樣式
            function updateRowSelectionStyles() {
                const rows = tableContainer.querySelectorAll('tbody tr');
                rows.forEach((row, index) => {
                    if (selectedRows.has(index)) {
                        row.classList.add('selected');
                    } else {
                        row.classList.remove('selected');
                    }
                });
            }
            
            // 導出選中的行
            function exportSelectedRows() {
                if (selectedRows.size === 0) {
                    alert('请先选择要导出的行');
                    return;
                }
                
                if (!currentSheetData) return;
                
                const headers = currentSheetData[0];
                
                const selectedData = Array.from(selectedRows)
                    .sort((a, b) => a - b)
                    .map(rowIndex => currentDisplayData[rowIndex]);
                
                const exportData = [headers, ...selectedData];
                const ws = XLSX.utils.aoa_to_sheet(exportData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, '导出数据');
                
                XLSX.writeFile(wb, 'selected_data.xlsx');
            }
            
            // 加載Excel文件
            function loadExcelFile() {
                tableContainer.innerHTML = '<div class="no-data">正在更新表格数据...</div>';
                sheetSelector.style.display = 'none';
                currentSortColumn = null;
                currentSortDirection = null;
                selectedRows.clear();
                updateSelectionInfo();
                
                refreshBtn.disabled = true;
                refreshBtn.textContent = '更新中...';
                
                const timestamp = new Date().getTime();
                
                fetch(`./data.xlsx?t=${timestamp}`)
                    .then(response => {
                        if (!response.ok) {
                            throw new Error(`文件加载失败: ${response.status} ${response.statusText}`);
                        }
                        return response.arrayBuffer();
                    })
                    .then(data => {
                        try {
                            currentWorkbook = XLSX.read(data, { type: 'array' });
                            tableContainer.innerHTML = '';
                            displayWorkbook(currentWorkbook);
                            setTimeout(() => {
                                tableWrapper.focus();
                            }, 500);
                        } catch (error) {
                            throw new Error('解析Excel文件时出错: ' + error.message);
                        }
                    })
                    .catch(error => {
                        console.error('加载Excel文件时出错:', error);
                        tableContainer.innerHTML = `<div class="no-data">加载失败: ${error.message}</div>`;
                    })
                    .finally(() => {
                        refreshBtn.disabled = false;
                        refreshBtn.textContent = '更新';
                    });
            }
            
            // 顯示工作簿內容
            function displayWorkbook(workbook) {
                tableContainer.innerHTML = '';
                
                const sheetNames = workbook.SheetNames;
                
                if (sheetNames.length === 1) {
                    displaySheet(workbook.Sheets[sheetNames[0]]);
                    sheetSelector.style.display = 'none';
                } else {
                    sheetSelector.style.display = 'flex';
                    sheetSelect.innerHTML = '';
                    
                    sheetNames.forEach(name => {
                        const option = document.createElement('option');
                        option.value = name;
                        option.textContent = name;
                        sheetSelect.appendChild(option);
                    });
                    
                    displaySheet(workbook.Sheets[sheetNames[0]]);
                    
                    sheetSelect.addEventListener('change', function() {
                        currentSortColumn = null;
                        currentSortDirection = null;
                        selectedRows.clear();
                        updateSelectionInfo();
                        displaySheet(workbook.Sheets[this.value]);
                        setTimeout(() => {
                            tableWrapper.focus();
                        }, 100);
                    });
                }
            }
            
            // 顯示工作表內容
            function displaySheet(sheet) {
                const jsonData = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                currentSheetData = jsonData;
                
                if (jsonData.length === 0) {
                    tableContainer.innerHTML = '<div class="no-data">此工作表为空</div>';
                    return;
                }
                
                currentDisplayData = jsonData.slice(1);
                originalDataRows = jsonData.slice(1);
                
                const table = document.createElement('table');
                
                const thead = document.createElement('thead');
                const headerRow = document.createElement('tr');
                
                const selectHeader = document.createElement('th');
                selectHeader.innerHTML = '<input type="checkbox" class="select-checkbox" id="selectAllHeader">';
                headerRow.appendChild(selectHeader);
                
                setTimeout(() => {
                    const selectAllHeader = document.getElementById('selectAllHeader');
                    if (selectAllHeader) {
                        selectAllHeader.addEventListener('change', function(e) {
                            e.stopPropagation();
                            const checkboxes = tableContainer.querySelectorAll('.select-checkbox:not(#selectAllHeader)');
                            checkboxes.forEach(checkbox => {
                                checkbox.checked = this.checked;
                                const rowIndex = parseInt(checkbox.dataset.rowIndex);
                                if (this.checked) {
                                    selectedRows.add(rowIndex);
                                } else {
                                    selectedRows.delete(rowIndex);
                                }
                            });
                            updateSelectionInfo();
                            updateRowSelectionStyles();
                        });
                    }
                }, 100);
                
                const headers = jsonData[0];
                headers.forEach((header, index) => {
                    const th = document.createElement('th');
                    th.title = header || '';
                    
                    th.innerHTML = `
                        <div class="header-content">
                            <span>${header || ''}</span>
                            <div class="sort-icons">
                                <div class="sort-icon sort-up" data-sort="up" data-column="${index}"></div>
                                <div class="sort-icon sort-down" data-sort="down" data-column="${index}"></div>
                            </div>
                        </div>
                    `;
                    
                    th.addEventListener('click', function(e) {
                        let sortDirection;
                        const target = e.target;
                        
                        if (target.classList.contains('sort-up')) {
                            sortDirection = 'desc';
                        } else if (target.classList.contains('sort-down')) {
                            sortDirection = 'asc';
                        } else {
                            if (currentSortColumn === index) {
                                sortDirection = currentSortDirection === 'asc' ? 'desc' : 'asc';
                            } else {
                                sortDirection = 'asc';
                            }
                        }
                        
                        sortData(index, sortDirection);
                        renderTable(currentDisplayData);
                        updateSortIcons(index, sortDirection);
                    });
                    
                    headerRow.appendChild(th);
                });
                
                thead.appendChild(headerRow);
                table.appendChild(thead);
                
                const tbody = document.createElement('tbody');
                table.appendChild(tbody);
                
                tableContainer.innerHTML = '';
                tableContainer.appendChild(table);
                
                renderTable(currentDisplayData);
                extractFilterValues();
                
                setTimeout(() => {
                    tableWrapper.scrollTop = 0;
                    tableWrapper.scrollLeft = 0;
                }, 100);
                
                if (currentSortColumn !== null && currentSortDirection !== null) {
                    sortData(currentSortColumn, currentSortDirection);
                    renderTable(currentDisplayData);
                    updateSortIcons(currentSortColumn, currentSortDirection);
                }
            }
            
            // 更新排序圖標狀態
            function updateSortIcons(columnIndex, direction) {
                const headers = tableContainer.querySelectorAll('th');
                headers.forEach(header => {
                    const sortIcons = header.querySelectorAll('.sort-icon');
                    sortIcons.forEach(icon => {
                        icon.classList.remove('active');
                    });
                });
                
                const currentHeader = headers[columnIndex + 1];
                if (currentHeader) {
                    if (direction === 'asc') {
                        currentHeader.querySelector('.sort-down').classList.add('active');
                    } else {
                        currentHeader.querySelector('.sort-up').classList.add('active');
                    }
                }
            }
            
            // 響應式處理
            function handleResize() {
                const width = window.innerWidth;
                
                if (width <= 768) {
                    document.querySelectorAll('.filter-option').forEach(opt => {
                        opt.style.fontSize = '0.8rem';
                        opt.style.padding = '4px 8px';
                    });
                    
                    document.querySelector('.filter-actions').style.flexWrap = 'wrap';
                } else {
                    document.querySelectorAll('.filter-option').forEach(opt => {
                        opt.style.fontSize = '0.85rem';
                        opt.style.padding = '6px 10px';
                    });
                    
                    document.querySelector('.filter-actions').style.flexWrap = 'nowrap';
                }
            }
            
            window.addEventListener('resize', handleResize);
            handleResize();
            
            // 初始化完成提示
            setTimeout(() => {
